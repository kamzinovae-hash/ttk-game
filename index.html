<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TTK Jump</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
font-family:Arial,sans-serif;
background:url("https://i.pinimg.com/originals/4e/de/5a/4ede5a33c5490195b2b17466ad26d124.gif") center/cover;
}

canvas{
display:block;
touch-action:none;
}

#hud{
position:fixed;
top:18px;
left:18px;
color:#fff;
font-size:22px;
font-weight:bold;
text-shadow:0 0 10px #6cf;
z-index:20;
}

button.shop{
position:fixed;
top:60px;
left:18px;
padding:10px 14px;
border:none;
border-radius:10px;
background:#fff;
cursor:pointer;
z-index:20;
}

#gameover{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
align-items:center;
justify-content:center;
flex-direction:column;
color:#fff;
z-index:30;
}

#gameover button{
padding:14px 26px;
font-size:18px;
border:none;
border-radius:12px;
margin-top:10px;
cursor:pointer;
}

#controls{
position:fixed;
bottom:18px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 24px;
box-sizing:border-box;
z-index:20;
}

.ctrl{
width:70px;
height:70px;
border-radius:50%;
background:rgba(255,255,255,.2);
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
color:#fff;
}
</style>
</head>

<body>

<div id="hud">Баллы: 0 | 💰 Баланс: 0</div>

<button class="shop" onclick="openShop()">🛒 Магазин</button>

<div id="gameover">
<h1>Game Over</h1>
<div id="finalscore"></div>
<button onclick="restartGame()">Играть снова</button>
<button onclick="sendScoreToBot()">Вернуться в бот</button>
</div>

<div id="controls">
<div class="ctrl" id="left">◀</div>
<div class="ctrl" id="right">▶</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

let score=0;
let balance=0;
let running=true;

const gravity=0.32;
const jumpPower=-13;

const player={
x:canvas.width/2,
y:500,
vx:0,
vy:0,
r:28
};

const mario=new Image();
mario.src="mario.png";

let platforms=[];
let coins=[];

// ===== СПАВН =====
function createLevel(){

platforms=[];
coins=[];

platforms.push({
x:canvas.width/2-130,
y:560,
w:260,
h:20
});

let lastY=560;

for(let i=1;i<5;i++){

let x=Math.random()*(canvas.width-180);
let y=lastY-170;

platforms.push({
x:x,
y:y,
w:180,
h:18
});

// коин строго над платформой
coins.push({
x:x+90,
y:y-30,
taken:false
});

lastY=y;
}
}

createLevel();

// ===== DRAW =====
function drawPlatform(p){
ctx.fillStyle="#6b7dff";
ctx.fillRect(p.x,p.y,p.w,p.h);
}

function drawCoins(){
for(let c of coins){
if(c.taken) continue;
ctx.beginPath();
ctx.arc(c.x,c.y,10,0,Math.PI*2);
ctx.fillStyle="gold";
ctx.fill();
}
}

function drawPlayer(){
ctx.drawImage(mario,player.x-65,player.y-72,130,92);
}

// ===== UPDATE =====
function update(){

if(!running) return;

player.vy+=gravity;
player.y+=player.vy;
player.x+=player.vx;

if(player.x<0) player.x=canvas.width;
if(player.x>canvas.width) player.x=0;

// платформы
for(let p of platforms){
if(
player.vy>0 &&
player.y+player.r>p.y &&
player.y+player.r<p.y+20 &&
player.x>p.x-10 &&
player.x<p.x+p.w+10
){
player.vy=jumpPower;
}
}

// коины
for(let c of coins){
if(!c.taken &&
Math.abs(player.x-c.x)<32 &&
Math.abs(player.y-c.y)<32
){
c.taken=true;
score++;
balance++;

document.getElementById("hud").innerHTML=
`Баллы: ${score} | 💰 Баланс: ${balance}`;
}
}

// скролл
if(player.y<canvas.height*0.35){
let diff=canvas.height*0.35-player.y;
player.y=canvas.height*0.35;

for(let p of platforms){
p.y+=diff;
if(p.y>canvas.height){
p.y=-80;
p.x=Math.random()*(canvas.width-180);
}
}

for(let c of coins){
c.y+=diff;
if(c.y>canvas.height){
c.y=-50;
c.x=Math.random()*(canvas.width-180);
c.taken=false;
}
}
}

if(player.y>canvas.height+120){
gameOver();
}
}

// ===== LOOP =====
function loop(){
update();
ctx.clearRect(0,0,canvas.width,canvas.height);
platforms.forEach(drawPlatform);
drawCoins();
drawPlayer();
requestAnimationFrame(loop);
}
loop();

// ===== GAME OVER =====
function gameOver(){
running=false;
document.getElementById("finalscore").innerText=
"Баллы: "+score;

document.getElementById("gameover").style.display="flex";
}

// ===== RESTART =====
function restartGame(){
score=0;
balance=0;

document.getElementById("hud").innerHTML=
"Баллы: 0 | 💰 Баланс: 0";

document.getElementById("gameover").style.display="none";

player.x=canvas.width/2;
player.y=500;
player.vy=0;

running=true;
createLevel();
}

// ===== SEND SCORE =====
function sendScoreToBot(){

if(window.Telegram && Telegram.WebApp){

Telegram.WebApp.sendData(
JSON.stringify({score:score,balance:balance})
);

Telegram.WebApp.close();

} else {
alert("Открой в Telegram");
}
}

// ===== SHOP =====
function openShop(){
alert(
"🛒 МАГАЗИН\n\n" +
"💰 Баланс: " + balance + "\n\n" +
"50 💰 — скидка 5%\n" +
"100 💰 — +ГБ интернета\n" +
"80 💰 — бонусные минуты\n" +
"120 💰 — Kino 7 дней\n" +
"70 💰 — приоритетная поддержка\n\n" +
"🎬 Kino: https://www.kinopoisk.ru/"
);
}

// ===== CONTROLS =====
addEventListener("keydown",e=>{
if(e.key==="ArrowLeft") player.vx=-5;
if(e.key==="ArrowRight") player.vx=5;
});
addEventListener("keyup",()=>player.vx=0);

document.getElementById("left").ontouchstart=()=>player.vx=-5;
document.getElementById("right").ontouchstart=()=>player.vx=5;
document.getElementById("left").ontouchend=()=>player.vx=0;
document.getElementById("right").ontouchend=()=>player.vx=0;

</script>
</body>
</html>
