========================================= -->

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TTK Jump</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

/* ===== ТВОЙ КРАСИВЫЙ ФОН ===== */
html,body{
margin:0;
overflow:hidden;
font-family:Arial;
background:url("https://i.pinimg.com/originals/4e/de/5a/4ede5a33c5490195b2b17466ad26d124.gif") center/cover;
}

/* ===== HUD ===== */
#hud{
position:fixed;
top:18px;
left:18px;
color:white;
font-size:24px;
font-weight:bold;
text-shadow:0 0 10px #6cf;
z-index:10;
}

/* ===== CANVAS ===== */
canvas{
display:block;
}

/* ===== КНОПКИ ===== */
#controls{
position:fixed;
bottom:18px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 24px;
}

.btn{
width:75px;
height:75px;
border-radius:50%;
background:rgba(255,255,255,.18);
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:32px;
}
</style>
</head>

<body>

<div id="hud">Баллы: 0</div>
<canvas id="game"></canvas>

<div id="controls">
<div class="btn" id="left">◀</div>
<div class="btn" id="right">▶</div>
</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let score = 0;
let balance = 0;

const player = {x:200,y:400,vx:0,vy:0};

const gravity = 0.35;
const jump = -12;

let platforms = [];
let coins = [];

function create(){
platforms = [];
coins = [];

for(let i=0;i<6;i++){
let x = Math.random()*300;
let y = 500 - i*120;

platforms.push({x,y,w:120,h:15});
coins.push({x:x+50,y:y-20,taken:false});
}
}
create();

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";
ctx.fillRect(player.x,player.y,30,30);

ctx.fillStyle="#6b7dff";
platforms.forEach(p=>{
ctx.shadowBlur=10;
ctx.shadowColor="#7aa2ff";
ctx.fillRect(p.x,p.y,p.w,p.h);
ctx.shadowBlur=0;
});

ctx.fillStyle="gold";
coins.forEach(c=>{
if(!c.taken){
ctx.beginPath();
ctx.arc(c.x,c.y,10,0,Math.PI*2);
ctx.fill();
}
});
}

function update(){

player.vy += gravity;
player.y += player.vy;
player.x += player.vx;

platforms.forEach(p=>{
if(player.vy>0 &&
player.y+30>=p.y &&
player.y+30<=p.y+10 &&
player.x>p.x &&
player.x<p.x+p.w){
player.vy = jump;
score++;
balance++;
document.getElementById("hud").innerText="Баллы: "+score;
}
});

coins.forEach(c=>{
if(!c.taken &&
Math.abs(player.x-c.x)<20 &&
Math.abs(player.y-c.y)<20){
c.taken=true;
score++;
balance++;
}
});

if(player.y>innerHeight){
tg.sendData(JSON.stringify({score,balance}));
tg.close();
}
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();

document.getElementById("left").onclick=()=>player.vx=-5;
document.getElementById("right").onclick=()=>player.vx=5;

</script>
</body>
</html>
