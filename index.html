<!DOCTYPE html>
<html lang="ru">
<head>

<!-- ==============================
📌 ОСНОВНЫЕ НАСТРОЙКИ СТРАНИЦЫ
============================== -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TTK Jump</title>

<!-- ==============================
📌 ПОДКЛЮЧЕНИЕ TELEGRAM WEBAPP
(связь игры с ботом)
============================== -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

/* ==============================
🎨 ОБЩИЕ СТИЛИ СТРАНИЦЫ
============================== */
html,body{
margin:0;
padding:0;
overflow:hidden;
font-family:Arial;
background:#111;
}

/* ==============================
📊 HUD (очки + баланс игрока)
============================== */
#hud{
position:fixed;
top:10px;
left:10px;
color:white;
font-size:18px;
z-index:10;
}

/* ==============================
🎁 КНОПКА ОТКРЫТИЯ БОНУСОВ
============================== */
#bonusBtn{
position:fixed;
top:50px;
left:10px;
z-index:10;
padding:10px;
border:none;
border-radius:10px;
background:white;
cursor:pointer;
}

/* ==============================
🧾 МЕНЮ БОНУСОВ (МАГАЗИН)
============================== */
#bonusPanel{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
color:white;
z-index:50;
padding:20px;
box-sizing:border-box;
}

#bonusPanel button{
width:100%;
margin:8px 0;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

/* ==============================
🎮 CANVAS (игровое поле)
============================== */
canvas{
display:block;
}

</style>
</head>

<body>

<!-- ==============================
📊 HUD (отображение очков и баланса)
============================== -->
<div id="hud">Баллы: 0 | 💰 Баланс: 0</div>

<!-- ==============================
🎁 КНОПКА БОНУСОВ (открывает магазин)
============================== -->
<button id="bonusBtn" onclick="openBonuses()">🎁 Бонусы</button>

<!-- ==============================
🎁 МЕНЮ БОНУСОВ (магазин игрока)
============================== -->
<div id="bonusPanel">

<h2>🎁 БОНУСЫ</h2>

<!-- баланс игрока -->
<div id="balanceText">💰 Баланс: 0</div>

<!-- покупки -->
<button onclick="buy('discount')">💸 Скидка 5% — 50</button>
<button onclick="buy('gb')">📶 +ГБ интернета — 100</button>
<button onclick="buy('minutes')">📞 Минуты — 80</button>
<button onclick="buy('kino')">🎬 Kino 7 дней — 120</button>
<button onclick="buy('support')">⚡ Приоритет — 70</button>

<button onclick="closeBonuses()">❌ Закрыть</button>

</div>

<!-- ==============================
🎮 ИГРОВОЕ ПОЛЕ (Canvas)
============================== -->
<canvas id="game"></canvas>

<script>

/* ==============================
🎮 ОСНОВНЫЕ ПЕРЕМЕННЫЕ ИГРЫ
============================== */
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

let score=0;      // очки игрока
let balance=0;    // валюта магазина
let running=true; // состояние игры

/* ==============================
🧍 ИГРОК
============================== */
const player={
x:200,
y:400,
vx:0,
vy:0
};

/* ==============================
🌍 ФИЗИКА ИГРЫ
============================== */
const gravity=0.35;
const jump=-12;

/* ==============================
🧱 ОБЪЕКТЫ УРОВНЯ
============================== */
let platforms=[];
let coins=[];

/* ==============================
🧱 СОЗДАНИЕ УРОВНЯ
(платформы + коины)
============================== */
function createLevel(){

platforms=[];
coins=[];

let y=500;

for(let i=0;i<5;i++){

let x=Math.random()*(canvas.width-150);

/* платформы */
platforms.push({
x:x,
y:y,
w:150,
h:20
});

/* коины — всегда над платформой */
coins.push({
x:x+70,
y:y-20,
taken:false
});

y-=150;
}
}
createLevel();

/* ==============================
🎨 ОТРИСОВКА ОБЪЕКТОВ
============================== */
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* платформы */
ctx.fillStyle="blue";
for(let p of platforms){
ctx.fillRect(p.x,p.y,p.w,p.h);
}

/* коины */
ctx.fillStyle="gold";
for(let c of coins){
if(!c.taken){
ctx.beginPath();
ctx.arc(c.x,c.y,8,0,Math.PI*2);
ctx.fill();
}
}

/* игрок */
ctx.fillStyle="red";
ctx.fillRect(player.x,player.y,25,25);
}

/* ==============================
🧠 ЛОГИКА ИГРЫ
============================== */
function update(){

if(!running) return;

/* движение игрока */
player.vy+=gravity;
player.y+=player.vy;
player.x+=player.vx;

/* границы экрана */
if(player.x<0) player.x=canvas.width;
if(player.x>canvas.width) player.x=0;

/* столкновение с платформами */
for(let p of platforms){
if(
player.vy>0 &&
player.y+25>p.y &&
player.y+25<p.y+20 &&
player.x>p.x &&
player.x<p.x+p.w
){
player.vy=jump;
}
}

/* сбор коинов */
for(let c of coins){
if(!c.taken &&
Math.abs(player.x-c.x)<20 &&
Math.abs(player.y-c.y)<20
){
c.taken=true;
score++;
balance++;
updateHUD();
}
}

/* скролл карты */
if(player.y<canvas.height*0.4){

let diff=canvas.height*0.4-player.y;
player.y=canvas.height*0.4;

/* движение платформ */
platforms.forEach(p=>{
p.y+=diff;
if(p.y>canvas.height){
p.y=-80;
p.x=Math.random()*(canvas.width-150);
}
});

/* движение коинов */
coins.forEach(c=>{
c.y+=diff;
if(c.y>canvas.height){
c.y=-50;
c.x=Math.random()*(canvas.width-150);
c.taken=false;
}
});
}

/* проигрыш */
if(player.y>canvas.height){
gameOver();
}
}

/* ==============================
🔁 ИГРОВОЙ ЦИКЛ
============================== */
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();

/* ==============================
📊 ОБНОВЛЕНИЕ HUD
============================== */
function updateHUD(){
document.getElementById("hud").innerHTML=
`Баллы: ${score} | 💰 ${balance}`;
}

/* ==============================
💀 GAME OVER
============================== */
function gameOver(){
running=false;
alert("Game Over! Score: "+score);
}

/* ==============================
🔄 ПЕРЕЗАПУСК
============================== */
function restartGame(){
score=0;
balance=0;
running=true;

player.x=200;
player.y=400;
player.vy=0;

updateHUD();
createLevel();
}

/* ==============================
📤 ОТПРАВКА В TELEGRAM
============================== */
function sendScoreToBot(){

if(window.Telegram && Telegram.WebApp){

Telegram.WebApp.sendData(
JSON.stringify({score, balance})
);

Telegram.WebApp.close();

}else{
alert("Открой через Telegram");
}
}

/* ==============================
🎁 БОНУС-МЕНЮ
============================== */
function openBonuses(){
document.getElementById("bonusPanel").style.display="block";
document.getElementById("balanceText").innerText=
"💰 Баланс: "+balance;
}

function closeBonuses(){
document.getElementById("bonusPanel").style.display="none";
}

/* ==============================
🛒 ПОКУПКИ БОНУСОВ
============================== */
function buy(type){

let prices={
discount:50,
gb:100,
minutes:80,
kino:120,
support:70
};

if(balance<prices[type]){
alert("❌ Недостаточно баллов");
return;
}

balance-=prices[type];

document.getElementById("balanceText").innerText=
"💰 Баланс: "+balance;

/* кино бонус */
if(type==="kino"){
window.open("https://www.kinopoisk.ru/","_blank");
}

alert("✅ Куплено: "+type);
}

/* ==============================
🎮 УПРАВЛЕНИЕ
============================== */
addEventListener("keydown",e=>{
if(e.key==="ArrowLeft") player.vx=-4;
if(e.key==="ArrowRight") player.vx=4;
});

addEventListener("keyup",()=>player.vx=0);

</script>
</body>
</html>
