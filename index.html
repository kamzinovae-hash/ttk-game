<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TTK Jump</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

/* =========================
🎨 ОСНОВНОЙ СТИЛЬ ИГРЫ
========================= */
html,body{
margin:0;
padding:0;
overflow:hidden;
font-family:Arial,sans-serif;
background:url("https://i.pinimg.com/originals/4e/de/5a/4ede5a33c5490195b2b17466ad26d124.gif") center/cover;
}

/* =========================
📊 HUD (баллы + баланс)
========================= */
#hud{
position:fixed;
top:18px;
left:18px;
color:#fff;
font-size:22px;
font-weight:bold;
text-shadow:0 0 10px #6cf;
z-index:20;
}

/* =========================
🛒 КНОПКИ МЕНЮ
========================= */
button.shop{
position:fixed;
top:60px;
left:18px;
padding:10px 14px;
border:none;
border-radius:10px;
background:#fff;
cursor:pointer;
z-index:20;
}

/* =========================
🎁 БОНУС МЕНЮ (НОВОЕ)
========================= */
#shopPanel{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
color:white;
z-index:50;
padding:20px;
box-sizing:border-box;
}

.shop-item{
background:rgba(255,255,255,0.1);
padding:10px;
margin:8px 0;
border-radius:10px;
cursor:pointer;
}

/* =========================
💀 GAME OVER
========================= */
#gameover{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
align-items:center;
justify-content:center;
flex-direction:column;
color:#fff;
z-index:30;
}

</style>
</head>

<body>

<!-- =========================
📊 HUD
========================= -->
<div id="hud">Баллы: 0 | 💰 Баланс: 0</div>

<!-- =========================
🛒 КНОПКА МАГАЗИНА
========================= -->
<button class="shop" onclick="openShop()">🛒 Магазин</button>

<!-- =========================
🎁 БОНУС МАГАЗИН (НОВЫЙ UI)
========================= -->
<div id="shopPanel">

<h2>🎁 БОНУСЫ</h2>

<div id="balanceText"></div>

<!-- =========================
💰 БОНУСЫ (выбор вручную)
========================= -->
<div class="shop-item" onclick="buy('discount')">💸 Скидка 5% — 50</div>
<div class="shop-item" onclick="buy('gb')">📶 +ГБ интернета — 100</div>
<div class="shop-item" onclick="buy('minutes')">📞 Минуты — 80</div>
<div class="shop-item" onclick="buy('kino')">🎬 Kino 7 дней — 120</div>
<div class="shop-item" onclick="buy('support')">⚡ Приоритет — 70</div>

<br>

<!-- =========================
🎬 КИНО ССЫЛКА
========================= -->
<a href="https://www.kinopoisk.ru/" target="_blank" style="color:#6cf;">
🎬 Онлайн кинотеатр
</a>

<br><br>

<button onclick="closeShop()">❌ Закрыть</button>

</div>

<!-- =========================
🎮 CANVAS
========================= -->
<canvas id="game"></canvas>

<!-- =========================
💀 GAME OVER
========================= -->
<div id="gameover">
<h1>Game Over</h1>
<div id="finalscore"></div>
<button onclick="restartGame()">Играть снова</button>
<button onclick="sendScoreToBot()">В бот</button>
</div>

<script>

/* =========================
🎮 ИГРОВЫЕ ДАННЫЕ
========================= */
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

let score=0;
let balance=0;
let running=true;

/* =========================
🧍 ИГРОК
========================= */
const player={
x:canvas.width/2,
y:500,
vx:0,
vy:0,
r:28
};

const gravity=0.32;
const jumpPower=-13;

/* =========================
🧱 ОБЪЕКТЫ
========================= */
let platforms=[];
let coins=[];

/* =========================
🧱 УРОВЕНЬ
========================= */
function createLevel(){

platforms=[];
coins=[];

platforms.push({
x:canvas.width/2-130,
y:560,
w:260,
h:20
});

let lastY=560;

for(let i=1;i<5;i++){

let x=Math.random()*(canvas.width-180);
let y=lastY-170;

platforms.push({x,y,w:180,h:18});

coins.push({
x:x+90,
y:y-30,
taken:false
});

lastY=y;
}
}
createLevel();

/* =========================
🎁 ОТКРЫТЬ МАГАЗИН
========================= */
function openShop(){
document.getElementById("shopPanel").style.display="block";
updateShop();
}

function closeShop(){
document.getElementById("shopPanel").style.display="none";
}

/* =========================
💰 ОБНОВЛЕНИЕ МАГАЗИНА
========================= */
function updateShop(){
document.getElementById("balanceText").innerHTML=
"💰 Баланс: "+balance;
}

/* =========================
🛒 ПОКУПКИ
========================= */
function buy(type){

let price={
discount:50,
gb:100,
minutes:80,
kino:120,
support:70
};

if(balance<price[type]){
alert("❌ Недостаточно баллов");
return;
}

balance-=price[type];

/* 🎬 бонус кино */
if(type==="kino"){
window.open("https://www.kinopoisk.ru/","_blank");
}

updateHUD();
updateShop();

alert("✅ Куплено: "+type);
}

/* =========================
🎨 РЕНДЕР
========================= */
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#6b7dff";
platforms.forEach(p=>{
ctx.fillRect(p.x,p.y,p.w,p.h);
});

ctx.fillStyle="gold";
coins.forEach(c=>{
if(!c.taken){
ctx.beginPath();
ctx.arc(c.x,c.y,10,0,Math.PI*2);
ctx.fill();
}
});

ctx.fillStyle="red";
ctx.fillRect(player.x,player.y,30,30);
}

/* =========================
🧠 ЛОГИКА
========================= */
function update(){

if(!running) return;

player.vy+=gravity;
player.y+=player.vy;
player.x+=player.vx;

/* сбор коинов */
coins.forEach(c=>{
if(!c.taken &&
Math.abs(player.x-c.x)<25 &&
Math.abs(player.y-c.y)<25
){
c.taken=true;
score++;
balance++;
updateHUD();
}
});
}

/* =========================
📊 HUD
========================= */
function updateHUD(){
document.getElementById("hud").innerText=
`Баллы: ${score} | 💰 ${balance}`;
}

/* =========================
🔁 LOOP
========================= */
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();

/* =========================
💀 GAME OVER
========================= */
function gameOver(){
running=false;
document.getElementById("gameover").style.display="flex";
document.getElementById("finalscore").innerText="Баллы: "+score;
}

/* =========================
🔄 RESTART
========================= */
function restartGame(){
score=0;
balance=0;
running=true;

player.x=canvas.width/2;
player.y=500;
player.vy=0;

updateHUD();
createLevel();

document.getElementById("gameover").style.display="none";
}

/* =========================
📤 TELEGRAM
========================= */
function sendScoreToBot(){
Telegram.WebApp.sendData(
JSON.stringify({score,balance})
);
Telegram.WebApp.close();
}

/* =========================
🎮 УПРАВЛЕНИЕ
========================= */
addEventListener("keydown",e=>{
if(e.key==="ArrowLeft") player.vx=-5;
if(e.key==="ArrowRight") player.vx=5;
});
addEventListener("keyup",()=>player.vx=0);

</script>

</body>
</html>
