<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TTK Jump — Original</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; background: #000; }
        canvas { display: block; background: url("https://i.pinimg.com/originals/4e/de/5a/4ede5a33c5490195b2b17466ad26d124.gif") center/cover; }
        #hud { position: fixed; top: 15px; left: 15px; color: #fff; font-size: 20px; font-weight: bold; text-shadow: 2px 2px 5px #000; z-index: 10; }
        #gameover { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); flex-direction: column; align-items: center; justify-content: center; color: #fff; z-index: 100; }
        .btn { padding: 15px 30px; font-size: 18px; border: none; border-radius: 25px; margin: 10px; cursor: pointer; font-weight: bold; }
        #controls { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; }
        .ctrl-btn { width: 80px; height: 80px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: #fff; user-select: none; }
    </style>
</head>
<body>

<div id="hud">Баллы: 0 | 💰 Монеты: 0</div>

<div id="gameover">
    <h1 style="color: #ff4d4d; font-size: 40px;">GAME OVER</h1>
    <div id="finalscore" style="font-size: 24px; margin-bottom: 20px;"></div>
    <button class="btn" style="background: #4CAF50; color: white;" onclick="restartGame()">ИГРАТЬ СНОВА</button>
    <button class="btn" style="background: #2196F3; color: white;" onclick="sendScoreToBot()">ВЕРНУТЬСЯ В БОТ</button>
</div>

<div id="controls">
    <div class="ctrl-btn" id="btnLeft">◀</div>
    <div class="ctrl-btn" id="btnRight">▶</div>
</div>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const tg = window.Telegram.WebApp;
    tg.expand();

    let score = 0;
    let balance = 0;
    let running = true;
    const gravity = 0.35;
    const jumpPower = -13;

    // Параметры игрока
    const player = { x: 0, y: 0, vx: 0, vy: 0, w: 60, h: 60 };
    const marioImg = new Image();
    marioImg.src = "https://kamzinovae-hash.github.io/ttk-game/mario.png"; // Убедись, что файл лежит в корне репозитория

    let platforms = [];
    let coins = [];

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        player.x = canvas.width / 2 - player.w / 2;
        player.y = canvas.height - 150;
        player.vy = 0;
        createLevel();
    }

    function createLevel() {
        platforms = [];
        coins = [];
        let y = canvas.height - 60;
        // Первая платформа под ногами
        platforms.push({ x: canvas.width / 2 - 80, y: y, w: 160, h: 15 });

        for (let i = 0; i < 7; i++) {
            y -= 160;
            spawnPlatform(y);
        }
    }

    function spawnPlatform(y) {
        let w = 130;
        let x = Math.random() * (canvas.width - w);
        platforms.push({ x: x, y: y, w: w, h: 15 });
        if (Math.random() > 0.3) {
            coins.push({ x: x + w / 2, y: y - 35, taken: false });
        }
    }

    function update() {
        if (!running) return;

        player.vy += gravity;
        player.y += player.vy;
        player.x += player.vx;

        // Бесконечный экран по бокам
        if (player.x + player.w < 0) player.x = canvas.width;
        if (player.x > canvas.width) player.x = -player.w;

        // Коллизия с платформами (только при падении)
        if (player.vy > 0) {
            platforms.forEach(p => {
                if (player.y + player.h > p.y && 
                    player.y + player.h < p.y + p.h + 15 &&
                    player.x + player.w > p.x && 
                    player.x < p.x + p.w) {
                    player.vy = jumpPower;
                }
            });
        }

        // Сбор монет
        coins.forEach(c => {
            if (!c.taken && Math.abs(player.x + player.w/2 - c.x) < 30 && Math.abs(player.y + player.h/2 - c.y) < 30) {
                c.taken = true;
                score += 10;
                balance += 1;
                document.getElementById("hud").innerText = `Баллы: ${score} | 💰 Монеты: ${balance}`;
            }
        });

        // Скролл вверх
        if (player.y < canvas.height * 0.4) {
            let diff = canvas.height * 0.4 - player.y;
            player.y = canvas.height * 0.4;
            platforms.forEach(p => {
                p.y += diff;
                if (p.y > canvas.height) {
                    p.y = -20;
                    p.x = Math.random() * (canvas.width - 130);
                }
            });
            coins.forEach(c => {
                c.y += diff;
                if (c.y > canvas.height) {
                    c.taken = false;
                    c.y = -50;
                    c.x = Math.random() * canvas.width;
                }
            });
        }

        if (player.y > canvas.height + 100) gameOver();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Платформы
        ctx.fillStyle = "#6B7DFF";
        platforms.forEach(p => {
            ctx.fillRect(p.x, p.y, p.w, p.h);
        });

        // Монеты
        ctx.fillStyle = "gold";
        coins.forEach(c => {
            if (!c.taken) {
                ctx.beginPath();
                ctx.arc(c.x, c.y, 10, 0, Math.PI * 2);
                ctx.fill();
            }
        });

        // Марио (рисуем строго квадратом, чтобы не растягивался)
        if (marioImg.complete) {
            ctx.drawImage(marioImg, player.x, player.y, player.w, player.h);
        } else {
            ctx.fillStyle = "red";
            ctx.fillRect(player.x, player.y, player.w, player.h);
        }
    }

    function gameOver() {
        running = false;
        document.getElementById("finalscore").innerText = `Счет: ${score}`;
        document.getElementById("gameover").style.display = "flex";
    }

    function restartGame() {
        score = 0; balance = 0;
        document.getElementById("hud").innerText = `Баллы: 0 | 💰 Монеты: 0`;
        document.getElementById("gameover").style.display = "none";
        running = true;
        init();
    }

    function sendScoreToBot() {
        tg.sendData(JSON.stringify({ score: score, balance: balance }));
    }

    // Управление
    const btnLeft = document.getElementById("btnLeft");
    const btnRight = document.getElementById("btnRight");

    btnLeft.ontouchstart = (e) => { e.preventDefault(); player.vx = -6; };
    btnRight.ontouchstart = (e) => { e.preventDefault(); player.vx = 6; };
    btnLeft.ontouchend = () => { player.vx = 0; };
    btnRight.ontouchend = () => { player.vx = 0; };

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    init();
    loop();
</script>
</body>
</html>
