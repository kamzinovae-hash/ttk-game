<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TTK Jump</title>

<!-- =========================
🤖 TELEGRAM WEBAPP API
========================= -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

/* =========================
🎨 ОСНОВНОЙ СТИЛЬ
========================= */
html,body{
margin:0;
padding:0;
overflow:hidden;
font-family:Arial;
background:#000;
}

/* =========================
📊 HUD (баллы + баланс)
========================= */
#hud{
position:fixed;
top:10px;
left:10px;
color:white;
font-size:20px;
z-index:10;
}

/* =========================
🎮 CANVAS
========================= */
canvas{
display:block;
background:linear-gradient(#111,#222);
}

/* =========================
🎮 КНОПКИ УПРАВЛЕНИЯ
========================= */
#controls{
position:fixed;
bottom:10px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 20px;
}

.btn{
width:70px;
height:70px;
border-radius:50%;
background:rgba(255,255,255,0.2);
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
}

/* =========================
💀 GAME OVER
========================= */
#gameover{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
color:white;
justify-content:center;
align-items:center;
flex-direction:column;
}

button{
padding:10px 20px;
margin-top:10px;
border:none;
border-radius:10px;
}

</style>
</head>

<body>

<!-- =========================
📊 HUD
========================= -->
<div id="hud">
⭐ Баллы: 0 | 💰 Баланс: 0
</div>

<!-- =========================
🎮 CANVAS
========================= -->
<canvas id="game"></canvas>

<!-- =========================
💀 GAME OVER
========================= -->
<div id="gameover">
<h1>Game Over</h1>
<div id="final"></div>

<button onclick="restart()">🔁 Играть снова</button>
<button onclick="send()">📤 В бот</button>
</div>

<!-- =========================
🎮 КНОПКИ
========================= -->
<div id="controls">
<div class="btn" onclick="left()">◀</div>
<div class="btn" onclick="right()">▶</div>
</div>

<script>

/* =========================
🧠 TELEGRAM API
========================= */
const tg = window.Telegram.WebApp;
tg.expand();

/* =========================
🎮 CANVAS
========================= */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

/* =========================
📊 ДАННЫЕ ИГРЫ
========================= */
let score = 0;
let balance = 0;
let running = true;

/* =========================
🧍 ИГРОК
========================= */
let player = {
x:100,
y:400,
vx:0,
vy:0
};

/* =========================
🧱 ПЛАТФОРМЫ
========================= */
let platforms = [];

function create(){
platforms = [];

for(let i=0;i<6;i++){
platforms.push({
x:Math.random()*300,
y:i*120+100,
w:120,
h:10
});
}
}
create();

/* =========================
🎨 РИСОВАНИЕ
========================= */
function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";
ctx.fillRect(player.x,player.y,30,30);

ctx.fillStyle="blue";
platforms.forEach(p=>{
ctx.fillRect(p.x,p.y,p.w,p.h);
});
}

/* =========================
🧠 ЛОГИКА
========================= */
function update(){

if(!running) return;

player.y += 2;

/* падение */
if(player.y>canvas.height){
gameOver();
}

}

/* =========================
🔁 LOOP
========================= */
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();

/* =========================
🎮 УПРАВЛЕНИЕ
========================= */
function left(){ player.x -= 20; }
function right(){ player.x += 20; }

/* =========================
💀 GAME OVER
========================= */
function gameOver(){
running = false;

document.getElementById("gameover").style.display="flex";
document.getElementById("final").innerText=
"⭐ Баллы: " + score;
}

/* =========================
🔁 RESTART
========================= */
function restart(){
score = 0;
balance = 0;
running = true;

player.x=100;
player.y=400;

document.getElementById("gameover").style.display="none";
updateHUD();
create();
}

/* =========================
📊 HUD
========================= */
function updateHUD(){
document.getElementById("hud").innerText=
`⭐ Баллы: ${score} | 💰 Баланс: ${balance}`;
}

/* =========================
📤 ОТПРАВКА В БОТ
========================= */
function send(){

tg.sendData(JSON.stringify({
score:score,
balance:balance
}));

tg.close();
}

</script>

</body>
</html>
