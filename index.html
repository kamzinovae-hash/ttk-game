<!DOCTYPE html>
<html lang="ru">
<head>

<!-- =========================
📌 БАЗОВЫЕ НАСТРОЙКИ СТРАНИЦЫ
========================= -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TTK Jump</title>

<!-- Telegram WebApp API -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

/* =========================
🎨 СТИЛИ ИГРЫ
========================= */

html,body{
margin:0;
padding:0;
overflow:hidden;
font-family:Arial;
background:url("https://i.pinimg.com/originals/4e/de/5a/4ede5a33c5490195b2b17466ad26d124.gif") center/cover;
}

/* canvas игры */
canvas{
display:block;
touch-action:none;
}

/* HUD (очки и баланс) */
#hud{
position:fixed;
top:15px;
left:15px;
color:white;
font-size:20px;
font-weight:bold;
text-shadow:0 0 10px #6cf;
z-index:10;
}

/* кнопки меню */
button.menu{
position:fixed;
top:60px;
left:15px;
padding:10px;
border:none;
border-radius:10px;
background:white;
cursor:pointer;
z-index:10;
}

/* окно бонусов */
#bonusPanel{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
color:white;
z-index:50;
padding:20px;
box-sizing:border-box;
}

#bonusPanel button{
margin:5px 0;
padding:10px;
width:100%;
border:none;
border-radius:10px;
cursor:pointer;
}

/* game over экран */
#gameover{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
color:white;
z-index:30;
align-items:center;
justify-content:center;
flex-direction:column;
}

</style>
</head>

<body>

<!-- =========================
📊 HUD (очки и баланс)
========================= -->
<div id="hud">Баллы: 0 | 💰 Баланс: 0</div>

<!-- =========================
🎁 КНОПКА БОНУСОВ
========================= -->
<button class="menu" onclick="openBonuses()">🎁 Бонусы</button>

<!-- =========================
🎮 CANVAS ИГРЫ
========================= -->
<canvas id="game"></canvas>

<!-- =========================
💀 GAME OVER ЭКРАН
========================= -->
<div id="gameover">
<h2>Game Over</h2>
<div id="finalscore"></div>
<button onclick="restartGame()">Играть снова</button>
<button onclick="sendScoreToBot()">В бот</button>
</div>

<!-- =========================
🎁 МЕНЮ БОНУСОВ (МАГАЗИН)
========================= -->
<div id="bonusPanel">

<h2>🎁 БОНУСЫ</h2>

<div id="balanceText"></div>

<button onclick="buy('discount')">💸 Скидка 5% — 50💰</button>
<button onclick="buy('gb')">📶 +ГБ интернета — 100💰</button>
<button onclick="buy('minutes')">📞 Минуты — 80💰</button>
<button onclick="buy('kino')">🎬 Kino 7 дней — 120💰</button>
<button onclick="buy('support')">⚡ Приоритет — 70💰</button>

<br>
<button onclick="closeBonuses()">❌ Закрыть</button>

</div>

<script>

/* =========================
🎮 ПЕРЕМЕННЫЕ ИГРЫ
========================= */

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

let score=0;
let balance=0;
let running=true;

/* игрок */
const player={
x:canvas.width/2,
y:500,
vx:0,
vy:0
};

/* физика */
const gravity=0.32;
const jumpPower=-13;

/* платформы и коины */
let platforms=[];
let coins=[];

/* =========================
🧱 СОЗДАНИЕ УРОВНЯ
========================= */
function createLevel(){

platforms=[];
coins=[];

platforms.push({
x:canvas.width/2-130,
y:560,
w:260,
h:20
});

let lastY=560;

for(let i=1;i<5;i++){

let x=Math.random()*(canvas.width-180);
let y=lastY-170;

platforms.push({
x:x,
y:y,
w:180,
h:18
});

/* коин строго над платформой */
coins.push({
x:x+90,
y:y-30,
taken:false
});

lastY=y;
}
}
createLevel();

/* =========================
🎨 РЕНДЕР ОБЪЕКТОВ
========================= */
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* платформы */
ctx.fillStyle="#6b7dff";
platforms.forEach(p=>{
ctx.fillRect(p.x,p.y,p.w,p.h);
});

/* коины */
for(let c of coins){
if(c.taken) continue;
ctx.beginPath();
ctx.arc(c.x,c.y,10,0,Math.PI*2);
ctx.fillStyle="gold";
ctx.fill();
}

/* игрок */
ctx.fillStyle="red";
ctx.fillRect(player.x,player.y,30,30);
}

/* =========================
🧠 ЛОГИКА ИГРЫ
========================= */
function update(){

if(!running) return;

/* движение */
player.vy+=gravity;
player.y+=player.vy;
player.x+=player.vx;

/* края */
if(player.x<0) player.x=canvas.width;
if(player.x>canvas.width) player.x=0;

/* платформы */
for(let p of platforms){
if(
player.vy>0 &&
player.y+30>p.y &&
player.y+30<p.y+20 &&
player.x>p.x &&
player.x<p.x+p.w
){
player.vy=jumpPower;
}
}

/* коины */
for(let c of coins){
if(!c.taken &&
Math.abs(player.x-c.x)<25 &&
Math.abs(player.y-c.y)<25
){
c.taken=true;
score++;
balance++;
updateHUD();
}
}

/* скролл */
if(player.y<canvas.height*0.4){

let diff=canvas.height*0.4-player.y;
player.y=canvas.height*0.4;

platforms.forEach(p=>{
p.y+=diff;
if(p.y>canvas.height){
p.y=-80;
p.x=Math.random()*(canvas.width-180);
}
});

/* 🔥 коины всегда обновляются */
coins.forEach(c=>{
c.y+=diff;
if(c.y>canvas.height){
c.y=-50;
c.x=Math.random()*(canvas.width-180);
c.taken=false;
}
});
}

/* проигрыш */
if(player.y>canvas.height){
gameOver();
}
}

/* =========================
🔁 ГЛАВНЫЙ ЦИКЛ
========================= */
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();

/* =========================
📊 HUD ОБНОВЛЕНИЕ
========================= */
function updateHUD(){
document.getElementById("hud").innerHTML=
`Баллы: ${score} | 💰 Баланс: ${balance}`;
}

/* =========================
💀 GAME OVER
========================= */
function gameOver(){
running=false;
document.getElementById("gameover").style.display="flex";
document.getElementById("finalscore").innerText="Баллы: "+score;
}

/* =========================
🔄 RESTART
========================= */
function restartGame(){
score=0;
balance=0;
running=true;

player.x=canvas.width/2;
player.y=500;
player.vy=0;

updateHUD();
createLevel();

document.getElementById("gameover").style.display="none";
}

/* =========================
📤 ОТПРАВКА В TELEGRAM
========================= */
function sendScoreToBot(){

if(window.Telegram && Telegram.WebApp){

Telegram.WebApp.sendData(
JSON.stringify({score, balance})
);

Telegram.WebApp.close();

}else{
alert("Открой через Telegram");
}
}

/* =========================
🎁 БОНУС МЕНЮ
========================= */

let bonuses={
discount:false,
gb:false,
minutes:false,
kino:false,
support:false
};

function openBonuses(){
document.getElementById("bonusPanel").style.display="block";
updateBonusUI();
}

function closeBonuses(){
document.getElementById("bonusPanel").style.display="none";
}

function updateBonusUI(){
document.getElementById("balanceText").innerHTML=
"💰 Баланс: " + balance;
}

/* покупка бонусов */
function buy(type){

let prices={
discount:50,
gb:100,
minutes:80,
kino:120,
support:70
};

if(balance<prices[type]){
alert("❌ Недостаточно баллов");
return;
}

balance-=prices[type];
bonuses[type]=true;

updateHUD();
updateBonusUI();

/* кино бонус */
if(type==="kino"){
window.open("https://www.kinopoisk.ru/","_blank");
}

alert("✅ Куплено: " + type);
}

/* =========================
🎮 УПРАВЛЕНИЕ
========================= */

addEventListener("keydown",e=>{
if(e.key==="ArrowLeft") player.vx=-5;
if(e.key==="ArrowRight") player.vx=5;
});
addEventListener("keyup",()=>player.vx=0);

</script>

</body>
</html>
