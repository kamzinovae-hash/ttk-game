<!DOCTYPE html>
<html lang="ru">

<head>

<!-- =================================
📌 ОСНОВНЫЕ НАСТРОЙКИ СТРАНИЦЫ
================================= -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TTK Jump</title>

<!-- =================================
📌 СВЯЗЬ С TELEGRAM WEBAPP
================================= -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

/* =================================
🎨 ОБЩИЙ СТИЛЬ ИГРЫ
================================= */
html,body{
margin:0;
padding:0;
overflow:hidden;
font-family:Arial;
background:#111;
}

/* =================================
📊 HUD (очки + баланс)
================================= */
#hud{
position:fixed;
top:10px;
left:10px;
color:white;
font-size:18px;
z-index:10;
}

/* =================================
🎁 КНОПКА БОНУСОВ (если расширишь игру)
================================= */
button{
position:fixed;
top:50px;
left:10px;
z-index:10;
}

/* =================================
🎮 ИГРОВОЕ ПОЛЕ
================================= */
canvas{
display:block;
}

</style>
</head>

<body>

<!-- =================================
📊 HUD (информация игрока)
================================= -->
<div id="hud">Баллы: 0 | 💰 Баланс: 0</div>

<!-- =================================
🎮 ИГРОВОЕ ПОЛЕ
================================= -->
<canvas id="game"></canvas>

<script>

/* =================================
🎮 ОСНОВНЫЕ ПЕРЕМЕННЫЕ ИГРЫ
================================= */
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

/* =================================
📊 ДАННЫЕ ИГРОКА
================================= */
let score=0;     // очки
let balance=0;   // валюта

/* =================================
🧍 ИГРОК
================================= */
const player={
x:200,
y:400,
vx:0,
vy:0
};

/* =================================
🌍 ФИЗИКА
================================= */
const gravity=0.35;
const jump=-12;

/* =================================
🧱 ОБЪЕКТЫ МИРА
================================= */
let platforms=[];
let coins=[];

/* =================================
🧱 СОЗДАНИЕ УРОВНЯ
================================= */
function createLevel(){

platforms=[];
coins=[];

let y=500;

for(let i=0;i<5;i++){

let x=Math.random()*(canvas.width-150);

/* платформа */
platforms.push({
x,y,w:150,h:20
});

/* коин */
coins.push({
x:x+70,
y:y-20,
taken:false
});

y-=150;
}
}
createLevel();

/* =================================
🎨 ОТРИСОВКА
================================= */
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* платформы */
ctx.fillStyle="blue";
platforms.forEach(p=>{
ctx.fillRect(p.x,p.y,p.w,p.h);
});

/* коины */
ctx.fillStyle="gold";
coins.forEach(c=>{
if(!c.taken){
ctx.beginPath();
ctx.arc(c.x,c.y,8,0,Math.PI*2);
ctx.fill();
}
});

/* игрок */
ctx.fillStyle="red";
ctx.fillRect(player.x,player.y,25,25);
}

/* =================================
🧠 ЛОГИКА ИГРЫ
================================= */
function update(){

player.vy+=gravity;
player.y+=player.vy;
player.x+=player.vx;

/* сбор коинов */
coins.forEach(c=>{
if(!c.taken &&
Math.abs(player.x-c.x)<20 &&
Math.abs(player.y-c.y)<20
){
c.taken=true;
score++;
balance++;
updateHUD();
}
});
}

/* =================================
📊 ОБНОВЛЕНИЕ HUD
================================= */
function updateHUD(){
document.getElementById("hud").innerText=
`Баллы: ${score} | 💰 ${balance}`;
}

/* =================================
🔁 ИГРОВОЙ ЦИКЛ
================================= */
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();

/* =================================
📤 ОТПРАВКА В БОТ
================================= */
function sendToBot(){

Telegram.WebApp.sendData(
JSON.stringify({score,balance})
);

Telegram.WebApp.close();
}

/* =================================
🎮 УПРАВЛЕНИЕ
================================= */
addEventListener("keydown",e=>{
if(e.key==="ArrowLeft") player.vx=-5;
if(e.key==="ArrowRight") player.vx=5;
});
addEventListener("keyup",()=>player.vx=0);

</script>
</body>
</html>
